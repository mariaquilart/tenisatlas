<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atlas del Tenis</title>
  <meta name="description" content="Explora la historia y las estadísticas del tenis profesional.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <main class="hero">
    <div class="hero__court" aria-hidden="true">
      <div class="court-lines"></div>
    </div>
    <div class="hero__vignette" aria-hidden="true"></div>
    <div class="hero__grain" aria-hidden="true"></div>

    <div class="hero__content">
      <h1 class="hero__title">
        <span class="hero__title-line">ATLAS</span>
        <span class="hero__title-line hero__title-line--accent">DEL TENIS</span>
      </h1>

      <p class="hero__subtitle">Historia y Estadísticas del Tenis</p>

      <nav class="hero__actions" aria-label="Selección de circuito">
        <a href="atp.html" class="tour-btn tour-btn--atp">
          <span class="tour-btn__label">ATP</span>
          <span class="tour-btn__sub">Circuito Masculino</span>
        </a>
        <a href="wta.html" class="tour-btn tour-btn--wta">
          <span class="tour-btn__label">WTA</span>
          <span class="tour-btn__sub">Circuito Femenino</span>
        </a>
      </nav>
    </div>

    <div class="hero__scroll" aria-hidden="true">
      <span></span>
    </div>
  </main>

  <footer class="credit-section" id="credit-section">
    <div class="credit-section__inner">
      <span class="credit-section__label">Creado por</span>
      <a class="credit-section__email" href="https://mail.google.com/mail/?view=cm&amp;fs=1&amp;to=maria.quilart@gmail.com" target="_blank" rel="noopener noreferrer">maria.quilart@gmail.com</a>
    </div>
  </footer>

  <script src="js/script.js"></script>
  <script src="js/credit.js"></script>
</body>
</html>
