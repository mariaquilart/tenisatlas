<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATP — Atlas del Tenis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="page--sub">
  <header class="site-nav">
    <a href="index.html" class="site-nav__logo" aria-label="Atlas del Tenis — Inicio">
      <svg class="site-nav__logo-mark" viewBox="0 0 40 40" aria-hidden="true">
        <circle cx="20" cy="20" r="17" fill="none" stroke="currentColor" stroke-width="1.4"/>
        <path d="M9 6 C17 13 17 27 9 34" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        <path d="M31 6 C23 13 23 27 31 34" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      <span class="site-nav__logo-text">Atlas del Tenis</span>
    </a>
    <nav class="site-nav__menu" aria-label="Navegación del circuito">
      <button type="button" class="site-nav__link" id="atp-map-btn" aria-pressed="false">Mapa</button>
      <button type="button" class="site-nav__link">Calendarios</button>
      <button type="button" class="site-nav__link">Versus</button>
      <button type="button" class="site-nav__link">Historial</button>
      <button type="button" class="site-nav__link">H2H</button>
      <button type="button" class="site-nav__link">Palmarés</button>
      <button type="button" class="site-nav__link">Campeones</button>
      <button type="button" class="site-nav__link">Filtros</button>
    </nav>
  </header>

  <main class="hero" id="atp-hero">
    <div class="hero__court" aria-hidden="true">
      <div class="court-lines"></div>
    </div>
    <div class="hero__vignette" aria-hidden="true"></div>
    <div class="hero__grain" aria-hidden="true"></div>

    <div class="hero__content">
      <p class="hero__eyebrow">Circuito Masculino</p>
      <h1 class="hero__title">
        <span class="hero__title-line">ATP</span>
        <span class="hero__title-line hero__title-line--accent">Tour</span>
      </h1>
    </div>
  </main>

  <section class="map-view" id="atp-map-view" hidden>
    <div class="map-filters" id="atp-map-filters" aria-label="Filtros del mapa">
      <div class="map-filters__group" role="group" aria-label="Filtrar por categoría">
        <span class="map-filters__label">Categoría</span>
        <div class="map-filters__chips" data-filter-group="category"></div>
      </div>
      <div class="map-filters__group" role="group" aria-label="Filtrar por superficie">
        <span class="map-filters__label">Superficie</span>
        <div class="map-filters__chips" data-filter-group="surface"></div>
      </div>
      <span class="map-filters__empty" id="atp-map-empty" hidden>Ningún torneo cumple estos filtros</span>
    </div>
    <div class="map-view__canvas" id="atp-map-canvas"></div>
  </section>

  <script src="js/script.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="js/atp-tournaments-data.js"></script>
  <script src="js/atp-map.js"></script>
</body>
</html>
