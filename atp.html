<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATP — Atlas del Tenis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="page--sub">
  <header class="site-nav">
    <a href="index.html" class="site-nav__logo" aria-label="Atlas del Tenis — Inicio">
      <svg class="site-nav__logo-mark" viewBox="0 0 40 40" aria-hidden="true">
        <circle cx="20" cy="20" r="17" fill="none" stroke="currentColor" stroke-width="1.4"/>
        <path d="M9 6 C17 13 17 27 9 34" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        <path d="M31 6 C23 13 23 27 31 34" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      <span class="site-nav__logo-text">Atlas del Tenis</span>
    </a>
    <nav class="site-nav__menu" aria-label="Navegación del circuito">
      <button type="button" class="site-nav__link" id="atp-map-btn" aria-pressed="false">Mapa</button>
      <button type="button" class="site-nav__link" id="atp-calendar-btn" aria-haspopup="menu" aria-expanded="false" aria-controls="atp-calendar-menu">Calendario</button>
      <button type="button" class="site-nav__link">Versus</button>
      <button type="button" class="site-nav__link">Historial</button>
      <button type="button" class="site-nav__link">H2H</button>
      <button type="button" class="site-nav__link">Palmarés</button>
      <button type="button" class="site-nav__link">Campeones</button>
      <button type="button" class="site-nav__link">Filtros</button>
    </nav>
  </header>

  <div class="calendar-menu" id="atp-calendar-menu" role="menu" aria-label="Opciones de calendario" hidden>
    <button type="button" class="calendar-menu__item" role="menuitem">Cumpleaños</button>
    <button type="button" class="calendar-menu__item" id="atp-tournaments-calendar-option" role="menuitem">Torneos</button>
  </div>

  <main class="hero" id="atp-hero">
    <div class="hero__court" aria-hidden="true">
      <div class="court-lines"></div>
    </div>
    <div class="hero__vignette" aria-hidden="true"></div>
    <div class="hero__grain" aria-hidden="true"></div>

    <div class="hero__content">
      <p class="hero__eyebrow">Circuito Masculino</p>
      <h1 class="hero__title">
        <span class="hero__title-line">ATP</span>
        <span class="hero__title-line hero__title-line--accent">Tour</span>
      </h1>
    </div>
  </main>

  <section class="map-view" id="atp-map-view" hidden>
    <div class="map-filters" id="atp-map-filters" aria-label="Filtros del mapa">
      <div class="map-filters__group" role="group" aria-label="Filtrar por categoría">
        <span class="map-filters__label">Categoría</span>
        <div class="map-filters__chips" data-filter-group="category"></div>
      </div>
      <div class="map-filters__group" role="group" aria-label="Filtrar por superficie">
        <span class="map-filters__label">Superficie</span>
        <div class="map-filters__chips" data-filter-group="surface"></div>
      </div>
      <span class="map-filters__empty" id="atp-map-empty" hidden>Ningún torneo cumple estos filtros</span>
    </div>
    <div class="map-view__canvas" id="atp-map-canvas"></div>
  </section>

  <section class="tournaments-calendar" id="atp-tournaments-calendar" aria-labelledby="tournaments-calendar-title" hidden>
    <div class="tournaments-calendar__panel">
      <header class="tournaments-calendar__header">
        <button type="button" class="tournaments-calendar__nav" id="tournaments-calendar-prev" aria-label="Mes anterior">&#8592;</button>
        <h2 class="tournaments-calendar__title" id="tournaments-calendar-title"></h2>
        <button type="button" class="tournaments-calendar__nav" id="tournaments-calendar-next" aria-label="Mes siguiente">&#8594;</button>
      </header>
      <div class="tournaments-calendar__weekdays" aria-hidden="true">
        <span>Lun</span><span>Mar</span><span>Mié</span><span>Jue</span><span>Vie</span><span>Sáb</span><span>Dom</span>
      </div>
      <div class="tournaments-calendar__grid" id="tournaments-calendar-grid"></div>
    </div>
    <div class="calendar-tournament-modal" id="calendar-tournament-modal" hidden>
      <article class="calendar-tournament-card" role="dialog" aria-modal="true" aria-labelledby="calendar-tournament-name">
        <button type="button" class="calendar-tournament-card__close" id="calendar-tournament-close" aria-label="Cerrar información del torneo">&times;</button>
        <h3 class="calendar-tournament-card__name" id="calendar-tournament-name"></h3>
        <dl class="calendar-tournament-card__details" id="calendar-tournament-details"></dl>
      </article>
    </div>
  </section>

  <footer class="credit-section" id="credit-section">
    <div class="credit-section__inner">
      <span class="credit-section__label">Creado por</span>
      <a class="credit-section__email" href="https://mail.google.com/mail/?view=cm&amp;fs=1&amp;to=maria.quilart@gmail.com" target="_blank" rel="noopener noreferrer">maria.quilart@gmail.com</a>
    </div>
  </footer>

  <script src="js/script.js"></script>
  <script src="js/credit.js"></script>
  <script src="js/atp-calendar-menu.js"></script>
  <script src="js/atp-tournaments-calendar.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="js/atp-tournaments-data.js"></script>
  <script src="js/atp-map.js"></script>
</body>
</html>
